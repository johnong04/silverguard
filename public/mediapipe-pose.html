<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; media-src *;">
  <title>SilverGuard Vision Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #09090B;
    }
    
    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    #video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }
    
    #status {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.6);
      color: #10B981;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
      border-radius: 20px;
      z-index: 100;
    }
    
    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 24px;
      background: rgba(28, 25, 23, 0.95);
      border: 1px solid rgba(220, 38, 38, 0.5);
      color: white;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      border-radius: 16px;
      text-align: center;
      max-width: 85%;
      display: none;
      z-index: 200;
    }
    
    #error h3 {
      color: #DC2626;
      margin-bottom: 12px;
      font-size: 18px;
    }
    
    #error p {
      color: #A8A29E;
      line-height: 1.5;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="status">Initializing Vision Engine...</div>
    <div id="error"></div>
  </div>

  <script type="module">
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    const JADE_GREEN = '#10B981';
    const JADE_GREEN_LIGHT = 'rgba(16, 185, 129, 0.6)';

    let previousCentroid = null;
    let previousTime = null;
    let fallCooldown = false;
    const FALL_COOLDOWN_MS = 5000;

    let poseLandmarker = null;
    let lastDetectionTime = 0;
    const DETECTION_INTERVAL_MS = 100;

    const POSE_CONNECTIONS = [
      [11, 12], [11, 23], [12, 24], [23, 24],
      [11, 13], [13, 15], [12, 14], [14, 16],
      [23, 25], [25, 27], [24, 26], [26, 28],
      [0, 1], [1, 2], [2, 3], [3, 7],
      [0, 4], [4, 5], [5, 6], [6, 8],
      [9, 10], [11, 12]
    ];

    function showError(title, message) {
      errorEl.innerHTML = `<h3>${title}</h3><p>${message}</p>`;
      errorEl.style.display = 'block';
      statusEl.style.display = 'none';
      sendToReactNative('ERROR', { message: title + ': ' + message });
    }

    function updateStatus(message) {
      statusEl.textContent = message;
    }

    function sendToReactNative(type, data = {}) {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({ type, ...data }));
      }
    }

    function average(...points) {
      const validPoints = points.filter(p => p && p.visibility > 0.5);
      if (validPoints.length === 0) return null;
      return {
        x: validPoints.reduce((sum, p) => sum + p.x, 0) / validPoints.length,
        y: validPoints.reduce((sum, p) => sum + p.y, 0) / validPoints.length,
        visibility: validPoints.reduce((sum, p) => sum + p.visibility, 0) / validPoints.length
      };
    }

    function checkFall(landmarks) {
      if (fallCooldown) return;
      
      const shoulders = average(landmarks[11], landmarks[12]);
      const hips = average(landmarks[23], landmarks[24]);
      const ankles = average(landmarks[27], landmarks[28]);
      const nose = landmarks[0];
      
      if (!shoulders || !hips || !nose || !ankles) return;

      const centroid = average(shoulders, hips);
      if (!centroid) return;

      const now = Date.now();

      if (nose.y > ankles.y + 0.1 && nose.visibility > 0.7 && ankles.visibility > 0.5) {
        triggerFall('nose_below_ankles');
        return;
      }

      if (previousCentroid && previousTime) {
        const deltaY = centroid.y - previousCentroid.y;
        const deltaTime = now - previousTime;
        if (deltaY > 0.30 && deltaTime < 400 && deltaTime > 50) {
          triggerFall('rapid_drop');
          return;
        }
      }

      previousCentroid = { ...centroid };
      previousTime = now;
    }

    function triggerFall(reason) {
      if (fallCooldown) return;
      fallCooldown = true;
      updateStatus('⚠️ FALL DETECTED');
      sendToReactNative('FALL_DETECTED', { reason, timestamp: Date.now(), confidence: 0.95 });
      setTimeout(() => {
        fallCooldown = false;
        updateStatus('Guard Mode Active');
      }, FALL_COOLDOWN_MS);
    }

    function drawSkeleton(landmarks) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!landmarks || landmarks.length === 0) return;

      ctx.strokeStyle = JADE_GREEN;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';

      for (const [startIdx, endIdx] of POSE_CONNECTIONS) {
        const start = landmarks[startIdx];
        const end = landmarks[endIdx];
        if (start && end && start.visibility > 0.5 && end.visibility > 0.5) {
          ctx.beginPath();
          ctx.moveTo(start.x * canvas.width, start.y * canvas.height);
          ctx.lineTo(end.x * canvas.width, end.y * canvas.height);
          ctx.stroke();
        }
      }

      for (let i = 0; i < landmarks.length; i++) {
        const lm = landmarks[i];
        if (lm && lm.visibility > 0.5) {
          const x = lm.x * canvas.width;
          const y = lm.y * canvas.height;
          ctx.beginPath();
          ctx.arc(x, y, 8, 0, 2 * Math.PI);
          ctx.fillStyle = JADE_GREEN_LIGHT;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, 2 * Math.PI);
          ctx.fillStyle = JADE_GREEN;
          ctx.fill();
        }
      }
    }

    async function detectPose(timestamp) {
      if (!poseLandmarker || !video.videoWidth) {
        requestAnimationFrame(detectPose);
        return;
      }

      if (timestamp - lastDetectionTime < DETECTION_INTERVAL_MS) {
        requestAnimationFrame(detectPose);
        return;
      }
      lastDetectionTime = timestamp;

      try {
        const results = poseLandmarker.detectForVideo(video, timestamp);
        if (results.landmarks && results.landmarks.length > 0) {
          drawSkeleton(results.landmarks[0]);
          checkFall(results.landmarks[0]);
          if (!fallCooldown) updateStatus('Guard Mode Active');
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          updateStatus('Searching for person...');
        }
      } catch (err) {
        console.error('Detection error:', err);
      }

      requestAnimationFrame(detectPose);
    }

    async function initCamera() {
      updateStatus('Requesting camera access...');
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
      });
      video.srcObject = stream;
      return new Promise(resolve => {
        video.onloadedmetadata = () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          resolve();
        };
      });
    }

    async function initMediaPipe() {
      updateStatus('Loading AI model...');
      const { PoseLandmarker, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.21');
      const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.21/wasm');
      poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
          delegate: 'GPU'
        },
        runningMode: 'VIDEO',
        numPoses: 1,
        minPoseDetectionConfidence: 0.5,
        minPosePresenceConfidence: 0.5,
        minTrackingConfidence: 0.5
      });
      updateStatus('Vision Engine ready');
      sendToReactNative('READY');
    }

    async function init() {
      try {
        await initCamera();
        await initMediaPipe();
        requestAnimationFrame(detectPose);
      } catch (err) {
        showError('Vision Engine Error', err.message);
      }
    }

    init();
  </script>
</body>
</html>
